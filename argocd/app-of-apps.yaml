apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crud-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/rath123test/DevOpsify-three-tier-application-to-azure-AKS.git
    targetRevision: master
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
